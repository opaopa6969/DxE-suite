# DGE Plugin Manifest — adds gap_extraction phase to DRE workflow
plugin:
  id: dge
  name: "Design-Gap Extraction"
  version: "4.0.0"
  phases:
    - id: gap_extraction
      insert_after: spec
      ordering: 100
      description: "Run DGE sessions to discover design gaps"
      loop_until: "critical_gaps == 0 && high_gaps == 0"
      inputs:
        - spec_file
        - design_docs
      outputs:
        - gap_list
        - decisions
      side_effects:
        - writes: dge/sessions/
        - writes: dge/decisions/
      triggers:
        - "DGE して"
        - "gap を探し��"
      # Sub-state machine (DGE internal steps)
      states:
        - id: flow_detection
          next: context_collection
          description: "Flow + structure auto-detect (quick/design-review/brainstorm/tribunal/...)"
        - id: context_collection
          next: theme_clarification
          description: "Phase 0 — auto-read README, docs/, tree, git log, DVE ContextBundle"
        - id: theme_clarification
          next: character_selection
          description: "Clarify or refine theme"
        - id: character_selection
          next: dialogue_generation
          description: "Fixed frame (Yang+Imaizumi) + variable frame (theme-specific)"
        - id: dialogue_generation
          next: gap_structuring
          description: "Character dialogue → Gap markers"
        - id: gap_structuring
          next: session_save
          description: "Category + Severity classification"
        - id: session_save
          next: summary
          description: "Write to dge/sessions/"
        - id: summary
          next: user_choice
          description: "Gap/idea list + auto-merge results"
        - id: user_choice
          next: null
          description: "Branch: re-run / auto-iterate / spec / record DD / end"
          branches:
            re_run: theme_clarification
            auto_iterate: character_selection
            spec_generation: spec_generation
            record_decision: record_decision
            end: null
        - id: spec_generation
          next: null
          description: "UC/TECH/DD/DQ/ACT spec generation"
        - id: record_decision
          next: user_choice
          description: "DD-NNN recording + index update"
